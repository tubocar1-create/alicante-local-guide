name: Bus SUBUS IP Test (manual)

# Solo test: comprueba si la IP de GitHub Actions puede acceder a
# movilidad.vectalia.es (antes www.subus.es). Si pasa con 200 y devuelve
# datos parseables, podemos montar el cron real. Si vuelve 403, descartamos
# esta vía y pasamos a VPS / Fly.io.
#
# Lanzar a mano desde la pestaña Actions → "Run workflow".

on:
  workflow_dispatch:
    inputs:
      stop_code:
        description: 'Código de parada SUBUS (ej: 5110)'
        required: true
        default: '5110'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: IP saliente
        run: |
          echo "IP pública del runner:"
          curl -sS https://api.ipify.org && echo

      - name: Petición a www.subus.es (con redirect a vectalia)
        run: |
          echo "== curl con -L (sigue redirects) =="
          curl -sSL -o /tmp/out.html \
            -w "HTTP:%{http_code}\nFINAL_URL:%{url_effective}\nSIZE:%{size_download}\nTIME:%{time_total}s\n" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            -H "Accept-Language: es-ES,es;q=0.9" \
            --max-time 20 \
            "http://www.subus.es/QR/Alicante/consulta.aspx?p=${{ inputs.stop_code }}" || true

          echo ""
          echo "== Primeros 800 bytes de la respuesta =="
          head -c 800 /tmp/out.html
          echo ""
          echo ""
          echo "== Buscando líneas (Linea X destino: N min) =="
          grep -oiE "Linea\s+[0-9A-Za-z]+\s+[^:<]+:\s*[0-9]+\s*min" /tmp/out.html | head -20 \
            || echo "(sin coincidencias)"

      - name: Petición directa a movilidad.vectalia.es (HTTPS)
        run: |
          echo "== curl directo HTTPS sin redirect =="
          curl -sS -o /tmp/out2.html \
            -w "HTTP:%{http_code}\nSIZE:%{size_download}\n" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --max-time 20 \
            "https://movilidad.vectalia.es/QR/Alicante/consulta.aspx?p=${{ inputs.stop_code }}" || true

          echo ""
          head -c 800 /tmp/out2.html
          echo ""
