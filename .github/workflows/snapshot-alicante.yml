name: Snapshot Alicante (diario)

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 05:00 Europe/Madrid
  workflow_dispatch:      # permite lanzarlo a mano

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generar snapshot
        run: node scripts/build_alicante_snapshot.mjs

      - name: Commit si cambió
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/alicante_snapshot.json
          if git diff --cached --quiet; then
            echo "Sin cambios, no hace falta commit."
          else
            git commit -m "chore(snapshot): regenerar Alicante $(date -u +%Y-%m-%d)"
            git push
          fi
