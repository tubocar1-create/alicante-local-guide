	<script>

	
	function getPos(p,l) {
		var result="";
		
		if (l=="11H") l="011";
 
		switch (l) {
		case "014" : l = "084"; break;
		case "016" : l = "014"; break;
		case "TURIBUS" : l = "124";break;
		default: l = l;
		}
	
		$.ajax({
			type: "GET",
			url: 'https://qr.vectalia.es/Alicante/lib/request.aspx?p='+p+'&l='+l,
			async: false,
			headers: {"cache-control": "no-cache"},
			dataType: "text",
			//url: "http://localhost/Alicante/lib/request.aspx?p="+p+"&l="+l,
			cache: false,
			success: function(response){
				//alert("entro con linea: " + l +", parada: "+ p+" y devuelve :"+response);
				actualiza(response);
			},
			error: function(response){
			//alert("Falla la llamada, linea: " + l +", parada: "+ p + " y response: "+ response.d);
			window.location.href = 'http://qr.vectalia.es/Alicante/consulta.aspx?p='+nparada;
			}
			});
	return result;
	}
	
	function inicializa_mapa(){

	
	latitud_qr = "0";
	longitud_qr = "0";
	
	map = L.map('map', { zoomControl: false, }).setView([latitud_qr, longitud_qr], 16, {'animate' : false});
	
	L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 17,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> | <a href="https://alicante.vectalia.es">Servicio ofrecido por <img style="vertical-align: sub" src="img/vectalia.png"> Vectalia </a><br> <i>(*) Informaci&oacute;n actualizada cada 15 segundos<br/>El recorrido mostrado es orientativo y puede variar por incidencias ajenas al servicio</i>'
		
		}).addTo(map);
					
		//poste
		var ico_p = L.icon({
			iconUrl: src_qr,
			iconSize: [qr_x, qr_y],
			iconAnchor: [qr_ox, qr_oy]
			});
		var marker = L.marker([latitud_qr, longitud_qr], {icon: ico_p}).addTo(map);
			
		//qr
		var ico_pqr = L.icon({
			iconUrl: src_qr2,
			iconSize: [20, 20], 
			iconAnchor: [qr2_ox, qr2_oy]
			});
		marker = L.marker([latitud_qr, longitud_qr], {icon: ico_pqr}).addTo(map);
								
		//bus
		var ico_bus = L.icon({
				iconUrl: src_i,
				iconSize: [bus_x, bus_y]
			});
		marker_bus = L.marker([ "0",  "0"], {icon: ico_bus}).addTo(map);
		L.DomUtil.addClass(marker_bus._icon, 'busito');
			
		//popup
		popup = L.popup({offset: [0,-10], className: "busito", closeButton: false, autoPanPaddingTopLeft: [50, 50]});
	
		
		//marco ruta normalizada
		var kmlbackground = L.geoJson(null, {
			style: function(feature) {
			return {color: '#ffffff', weight: 8, opacity: opacity_l};
		}});
		omnivore.kml(src_kml, null, kmlbackground).addTo(map);	
		
		if(mostrar_desvios)
		{
		//marco desvio
		var kmldbackground = L.geoJson(null, {
			style: function(feature) {
			return {color: '#ffffff', weight: 8, opacity: 1};
		}});
		omnivore.kml(src_kmld, null, kmldbackground).addTo(map);	
		}
		//capa ruta orig
		map.createPane('rutap');
		map.getPane('rutap').style.zIndex = 400;
		//capa desvios
		map.createPane('rutadp');
		map.getPane('rutadp').style.zIndex = 440;
		
		//map.createPane('hogueras');
		//map.getPane('hogueras').style.zIndex = 540;

		var kmlruta = L.geoJson(null, {
			style: function(feature) { //color azul 00a6ed
			return {color: color_ruta, weight: 3, pane: "rutap", opacity: opacity_l};
		}});

		if(mostrar_desvios)
		{
		/*
			var polygon = L.polygon([
    [38.344429428822394, -0.4830701755557097],
    [38.34518673688661, -0.4814018416220592],
    [38.34494271626387, -0.4811175274790256],
	 [38.34408863761026, -0.4829146074397102]
],{ color: 'yellow', fillColor: '#FFD700', fillOpacity: 0.3,}).addTo(map);
		*/
			var legend = L.control({position: 'bottomright'});
			legend.onAdd = function (map) {
				var div = L.DomUtil.create('div', 'info legend');
				labels = ["<b>Recorrido:</b>"],
				//categories = ['&#128999;&nbsp;Navidad (hasta 7 de enero)&nbsp'];
				categories = ['&#128998;&nbsp;Itinerario Actual','&#128999;&nbsp;Anulado temporalmente'];
				//categories = ['&#128998;Habitual','&#128999;Desv&iacute;os&nbsp&nbsp&nbsp&nbsp'];

				for (var i = 0; i < categories.length; i++) {
					div.innerHTML += labels.push((categories[i] ? categories[i] : '+'));
					}
				div.innerHTML = labels.join('<br>');
				return div;
			};
			legend.addTo(map);

			var kmlrutad = L.geoJson(null, {
			style: function(feature) { //color naranja
			return {color: "#00a6ed", weight: 4, pane: "rutadp", opacity: 1};
			}});
			omnivore.kml(src_kmld, null, kmlrutad, {pane:'rutadp'}).addTo(map);	
		}

		omnivore.kml(src_kml, null, kmlruta, {pane:'ruta'}).addTo(map);	

}


	function actualiza(cadena) {

		lector = new Loader(cadena);
		var lineas = lector.getLineas();

		if( lineas.length == 0 ) window.location.href = 'http://qr.vectalia.es/Alicante/consulta.aspx?p='+nparada;
		
		if (performance.navigation.type == performance.navigation.TYPE_RELOAD) pr = 0;

		var estimacion = lineas[0][1].trim();
		var posicion = lineas[0][3].trim();
		var escabecera = lineas[0][4].trim();
		var esincorp = lineas[0][5].trim();
		
			   
		var latitud =  posicion.split(',')[0].trim();
		var longitud =  posicion.split(',')[1].trim();
						   
		if (!estimacion.localeCompare("0 min.")) estimacion = "Pr&oacute;ximo";
		/*
		if(esincorp == "incorp")
			estimacion = "Incorporaci&oacuten<br>"+estimacion;
		else
			if(escabecera == "cab")
				estimacion = "Salida en<br>"+estimacion;
*/ 
		var sin_d = new Array("096","016","017","007","28","092");
		
		if( sin_d.includes(linea)) mostrar_desvios = false;
		
		//if(mostrar_desvios) opacity_l = 1;

		var lat = (latitud);
		var lng = (longitud);
		var newLatLng = new L.LatLng(lat, lng);

		$(".busito").fadeOut(1000, function() {
		
		marker_bus.setLatLng(newLatLng); 
		popup=  L.popup({offset: [0,-10], className: "busito", closeButton: false, autoPanPaddingTopLeft: [50, 50]}).setLatLng(newLatLng).setContent('<p id="estimacon" align="center"><b><img src="img/reloj.png" width="18" height="18" style="vertical-align: sub">&nbsp'+estimacion+'</b> </p>');
		popup.openOn(map);
		});

		$(".busito").fadeIn(1000);
		
		//if(pr==1)	
		map.flyToBounds([[latitud_qr, longitud_qr],[latitud, longitud]],  {'duration': 1 , 'padding' : [50,50]});
			//else map.flyToBounds([[latitud_qr, longitud_qr],[latitud, longitud]],  { 'animate' : false, 'padding' : [50,50]});
		
		}//actualiza


</script>

<script>
function UrlExists(url)
{
    var http = new XMLHttpRequest();
    http.open('HEAD', url, false);
    http.send();
    return http.status!=404;
}


	const queryString = window.location.search;
	const urlParams = new URLSearchParams(queryString);
	//var linea = urlParams.get('l');
	var linea = "0";
	var pr = urlParams.get('pr');
	const nparada = "0";
	var mostrar_desvios = false;
	var lineas_desvio = new Array("005", "012");
	
	var latitud_qr ="";
	var longitud_qr ="";
	var map = null;
	var marker_bus = null;
	var popup = null;
	var color_ruta=null;

	var bus_x = 40;
	var bus_y = 40;
	var qr_x = 14;
	var qr_y = 90;
	var qr_ox = 7;
	var qr_oy = 80;
	var qr2_ox = 7;
	var qr2_oy = 38;
	
	var src_qr = "img/panel_bus.png";
	var src_qr2 = "img/qr2.gif";			 
	var src_i="img/bus.gif";

	var isWeekend = ([0,6].indexOf(new Date().getDay()) != -1);
	if ((linea=="011")&& !isWeekend) linea="11H";
 
	switch (linea) {
		case "084" : linea = "014"; break;
		case "014" : linea = "016"; break;
		case "124" : linea = "TURIBUS";src_i="img/bust.gif"; bus_x=40; bus_y=50;  break;
		default: linea = linea;
		}
	


	var src_kml = 'data/qr_kml/'+linea+'.kml';
	var src_kmld = 'data/qr_kml/'+linea+'d.kml';
	var opacity_l = 1;
	
	if(lineas_desvio.includes(linea)) {
		mostrar_desvios = true;
		opacity_l = "0.7";
		color_ruta = "#ff0000";
		//alert("existe desvio");
		}
	else{
		mostrar_desvios = false;
		opacity_l = "1";
		color_ruta = "#00a6ed";
		}
	
	

	const poblacion = 1;

	if (poblacion=="1") src_qr="img/totems_webp/t"+linea+".webp";
		else{
			qr_x = 30;
			qr_y = 45;
			qr_ox = 12;
			qr_oy = 45;
			qr2_oy = 15;
		}
	
const tiempo_recarga = 15000;

	$( document ).ready(function(){
	
	inicializa_mapa();
	getPos(nparada, linea);
	});
	
var intervalId = window.setInterval(function(){	getPos(nparada, linea);}, tiempo_recarga);


</script>
